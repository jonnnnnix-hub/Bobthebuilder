app = "bob-signals"
primary_region = "lax"

[http_service]
  internal_port = 3000
  auto_stop_machines = "suspend"
  auto_start_machines = true

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/health"

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "3000"
