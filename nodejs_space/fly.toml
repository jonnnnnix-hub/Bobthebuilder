app = "bob-signals"
primary_region = "lax"

[http_service]
  internal_port = 3000
  # CRITICAL: "off" keeps the machine running 24/7 so the @Interval(15000)
  # autonomous trading loop never stops. "suspend" kills the bot when idle.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/health"

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "3000"
  TZ = "America/New_York"
